name: Test Package

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  # Resolve the (lowercased) GHCR image repo once so both the matrixed build
  # and test jobs can reference a deterministic, per-R-version image name in
  # expression contexts (container.image / tags) without a bash lowercasing step.
  vars:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.v.outputs.image_repo }}
    steps:
      - id: v
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image_repo=ghcr.io/${owner_lc}/impuresrcref-r-ci" >> "$GITHUB_OUTPUT"

  build_image:
    needs: vars
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        # R 4.5 exercises the in-place (SET_TYPEOF/SET_BODY/...) code path;
        # R 4.6 exercises the public-API (Rf_allocLang/R_mkClosure/...) path.
        r_version: ["4.5.2", "4.6.1"]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .github/docker/r-ci
          file: .github/docker/r-ci/Dockerfile
          build-args: |
            R_VERSION=${{ matrix.r_version }}
          push: true
          tags: |
            ${{ needs.vars.outputs.image_repo }}:sha-${{ github.sha }}-r${{ matrix.r_version }}
            ${{ needs.vars.outputs.image_repo }}:latest-r${{ matrix.r_version }}
          cache-from: type=gha,scope=r${{ matrix.r_version }}
          cache-to: type=gha,mode=max,scope=r${{ matrix.r_version }}

  test:
    needs: [vars, build_image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r_version: ["4.5.2", "4.6.1"]
    container:
      image: ${{ needs.vars.outputs.image_repo }}:sha-${{ github.sha }}-r${{ matrix.r_version }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Show R session
        run: Rscript -e 'sessionInfo()'

      - name: Install package
        run: R CMD INSTALL .

      - name: Run tests
        run: Rscript -e "testthat::test_dir('tests/testthat', load_package = 'source')"

      - name: Run full package test (preinstalled ggplot2)
        env:
          FULL_TEST: "1"
        run: Rscript -e "testthat::test_file('tests/testthat/test-package-srcref-imputation.R')"

      - name: Run check
        # `mutator` is a Suggests dep used only by the mutation-testing workflow
        # (installed there via pak), not by this package's own tests. It is not
        # in the CI image, so don't let R CMD check ERROR on its absence.
        env:
          _R_CHECK_FORCE_SUGGESTS_: "false"
        run: R CMD check --no-manual .
